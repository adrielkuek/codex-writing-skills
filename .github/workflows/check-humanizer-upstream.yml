name: Check Humanizer upstream

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Check pinned Humanizer commit
        run: ./scripts/check-humanizer-upstream.sh
